services:
  btc-node:
    command:
      - -printtoconsole
      - -server=1
      - -txindex=1
      - -rpcbind=0.0.0.0
      - -rpcallowip=0.0.0.0/0
      - -rpcport=${BTC_RPC_PORT:-8332}
      - -port=${BTC_P2P_PORT:-8333}
      - -fallbackfee=${BTC_FALLBACK_FEE:-0.0002}

  snapshot-loader:
    environment:
      BTC_NETWORK: ${BTC_NETWORK:-bitcoin}
      SNAPSHOT_MODE: ${SNAPSHOT_MODE:-none}

  balance-history:
    environment:
      BTC_NETWORK: ${BTC_NETWORK:-bitcoin}

  usdb-indexer:
    environment:
      BTC_NETWORK: ${BTC_NETWORK:-bitcoin}
      INSCRIPTION_SOURCE: ${INSCRIPTION_SOURCE:-bitcoind}

  usdb-control-plane:
    environment:
      BALANCE_HISTORY_RPC_URL: ${BALANCE_HISTORY_RPC_URL:-http://balance-history:28010}
      USDB_INDEXER_RPC_URL: ${USDB_INDEXER_RPC_URL:-http://usdb-indexer:28020}
      BTC_RPC_URL: ${BTC_RPC_URL:-http://btc-node:8332}
      CONTROL_PLANE_PORT: ${CONTROL_PLANE_PORT:-28040}
